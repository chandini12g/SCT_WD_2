<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calc" role="application" aria-label="Calculator">
  <div class="display" aria-live="polite" aria-atomic="true">
    <div class="display-expr" id="expr"></div>
    <div class="display-val" id="display">0</div>
  </div>

  <div class="btn-grid">
    <button class="btn clear" data-action="clear">AC</button>
    <button class="btn op" data-action="sign">+/−</button>
    <button class="btn op" data-action="percent">%</button>
    <button class="btn op" data-action="op" data-val="/">÷</button>

    <button class="btn" data-action="digit" data-val="7">7</button>
    <button class="btn" data-action="digit" data-val="8">8</button>
    <button class="btn" data-action="digit" data-val="9">9</button>
    <button class="btn op" data-action="op" data-val="*">×</button>

    <button class="btn" data-action="digit" data-val="4">4</button>
    <button class="btn" data-action="digit" data-val="5">5</button>
    <button class="btn" data-action="digit" data-val="6">6</button>
    <button class="btn op" data-action="op" data-val="-">−</button>

    <button class="btn" data-action="digit" data-val="1">1</button>
    <button class="btn" data-action="digit" data-val="2">2</button>
    <button class="btn" data-action="digit" data-val="3">3</button>
    <button class="btn op" data-action="op" data-val="+">+</button>

    <button class="btn zero" data-action="digit" data-val="0">0</button>
    <button class="btn" data-action="decimal">.</button>
    <button class="btn eq" data-action="equals">=</button>
  </div>

  <p class="hint">
    <kbd>0–9</kbd> digits ·
    <kbd>+ − * /</kbd> ops ·
    <kbd>Enter</kbd> = ·
    <kbd>Esc</kbd> clear ·
    <kbd>⌫</kbd> delete
  </p>
</div>

<script src="script.js"></script>
</body>
</html>
